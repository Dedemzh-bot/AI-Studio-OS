<!-- AI Studio OS - Web Console -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio OS - 研发控制台</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    body { height: 100vh; display: flex; background-color: #ffffff; color: #333; }
    .sidebar { width: 220px; border-right: 2px solid #ddd; display: flex; flex-direction: column; padding: 20px 15px; background-color: #fff; }
    .tab-btn { width: 100%; padding: 15px; text-align: left; font-size: 20px; font-weight: bold; border: 1px solid #ccc; background-color: #fff; color: #333; cursor: pointer; margin-bottom: 10px; }
    .tab-btn.active { background-color: #333333; color: #ffffff; border-color: #333333; }
    .main-workspace { flex: 1; display: flex; flex-direction: column; padding: 20px 30px; }
    .log-container { flex: 1; border: 1px solid #eee; margin-bottom: 15px; overflow-y: auto; padding: 15px; background: #fafafa; border-radius: 4px; }
    .log-header { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px; }
    .log-content { font-size: 14px; line-height: 1.6; color: #666; white-space: pre-wrap; font-family: "Consolas","Courier New",monospace; }
    .control-bar { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
    .btn-toggle-engine { width: 140px; padding: 10px 0; font-size: 16px; font-weight: bold; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .btn-toggle-engine.off { background-color: #ff3b30; }
    .btn-toggle-engine.on { background-color: #00c853; color: #333; }
    .engine-status { margin-left: 10px; font-size: 18px; color: #333; font-weight: bold; }
    .input-container { height: 150px; }
    .chat-input { width: 100%; height: 100%; padding: 15px; font-size: 16px; border: 1px solid #999; border-radius: 4px; resize: none; outline: none; }
    .file-explorer { width: 380px; border-left: 2px solid #ddd; padding: 20px 15px; background-color: #fff; overflow-y: auto; }
    .file-explorer h2 { font-size: 20px; margin-bottom: 15px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    .file-list { list-style: none; }
    .file-item { display: flex; align-items: center; padding: 10px 5px; border-bottom: 1px solid #eee; cursor: pointer; }
    .file-item:hover { background-color: #f9f9f9; }
    .file-icon { font-size: 14px; margin-right: 10px; font-family: monospace; color: #007acc; font-weight: bold; width: 24px; }
    .file-icon.md::before { content: 'M'; color: #333; }
    .file-icon.json::before { content: '{}'; color: #d4a017; }
    .file-name { font-size: 13px; color: #555; word-break: break-all; }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex: 1; }
    #mainContent { display: flex; flex: 1; overflow: hidden; }

    /* HITL Prompt Modal */
    .hitl-overlay { display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
    .hitl-overlay.show { display:flex; }
    .hitl-dialog { background:#fff; border-radius:8px; padding:25px; max-width:600px; width:90%; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
    .hitl-dialog h3 { color:#e65100; margin-bottom:15px; }
    .hitl-dialog pre { background:#f5f5f5; padding:15px; border-radius:4px; font-size:14px; white-space:pre-wrap; max-height:300px; overflow-y:auto; margin-bottom:15px; }
    .hitl-dialog input[type=text] { width:100%; padding:10px; font-size:16px; border:2px solid #333; border-radius:4px; }
    .hitl-dialog button { margin-top:10px; padding:10px 30px; font-size:16px; background:#333; color:#fff; border:none; border-radius:4px; cursor:pointer; }
</style>
</head>
<body>

<div class="sidebar">
    <button class="tab-btn active" data-tab="write">写案子</button>
    <button class="tab-btn" data-tab="memory">记忆积累</button>
</div>

<div id="mainContent">
    <div class="tab-content active" id="tab-write">
        <div class="main-workspace">
            <div class="log-container" id="logScroll">
                <div class="log-header">终端日志</div>
                <div class="log-content" id="logContent">[System] 等待引擎启动...</div>
            </div>
            <div class="control-bar">
                <button class="btn-toggle-engine off" id="engineBtn">启动研发</button>
                <span class="engine-status" id="engineStatus">待机</span>
            </div>
            <div class="input-container">
                <textarea class="chat-input" id="userInput" placeholder="输入需求后按 Enter 提交..."></textarea>
            </div>
        </div>
        <div class="file-explorer">
            <h2>下发文件</h2>
            <ul class="file-list" id="fileList"></ul>
        </div>
    </div>

    <div class="tab-content" id="tab-memory">
        <div class="main-workspace">
            <div style="margin-bottom:15px;">
                <label>文档名 (在 .agent_workspace 内):</label>
                <input type="text" id="archDoc" placeholder="例: system_design_draft.md" style="width:100%;padding:8px;margin-top:5px;">
            </div>
            <div style="margin-bottom:15px;">
                <label>老板批注:</label>
                <textarea id="archComment" placeholder="例: 本案状态机流转极其严谨" style="width:100%;height:60px;padding:8px;margin-top:5px;resize:none;"></textarea>
            </div>
            <div style="display:flex;gap:10px;margin-bottom:15px;">
                <button id="btnRed" style="flex:1;padding:12px;background:#34a853;color:#fff;border:none;border-radius:4px;cursor:pointer;">归入红榜</button>
                <button id="btnBlack" style="flex:1;padding:12px;background:#ff3b30;color:#fff;border:none;border-radius:4px;cursor:pointer;">归入黑榜</button>
            </div>
            <div id="archResult" style="color:#666;"></div>
        </div>
        <div class="file-explorer">
            <h2>红榜</h2><ul class="file-list" id="bestFiles"></ul>
            <h2 style="margin-top:15px;">黑榜</h2><ul class="file-list" id="antiFiles"></ul>
        </div>
    </div>
</div>

<!-- HITL 审批弹窗 -->
<div class="hitl-overlay" id="hitlOverlay">
    <div class="hitl-dialog">
        <h3>🤖 智能体需要你的决策</h3>
        <pre id="hitlPrompt"></pre>
        <input type="text" id="hitlAnswer" placeholder="输入 'y' 通过，或输入修改意见打回..." autofocus>
        <button id="hitlSubmit">提交</button>
    </div>
</div>

<script>
const API = '/api';
let isRunning = false;
let pollTimer = null;

const engineBtn = document.getElementById('engineBtn');
const engineStatus = document.getElementById('engineStatus');
const userInput = document.getElementById('userInput');
const logContent = document.getElementById('logContent');
const logScroll = document.getElementById('logScroll');
const fileList = document.getElementById('fileList');
const hitlOverlay = document.getElementById('hitlOverlay');
const hitlPrompt = document.getElementById('hitlPrompt');
const hitlAnswer = document.getElementById('hitlAnswer');
const hitlSubmit = document.getElementById('hitlSubmit');

// ==================== 页签 ====================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'memory') refreshKnowledge();
    });
});

// ==================== 引擎 ====================
engineBtn.addEventListener('click', () => {
    isRunning = !isRunning;
    if (isRunning) {
        fetch(API + '/start', { method: 'POST' });
        engineBtn.className = 'btn-toggle-engine on';
        engineBtn.textContent = '停止研发';
        startPolling();
    } else {
        fetch(API + '/stop', { method: 'POST' });
        engineBtn.className = 'btn-toggle-engine off';
        engineBtn.textContent = '启动研发';
        stopPolling();
        engineStatus.textContent = '待机';
        hitlOverlay.classList.remove('show');
    }
});

// ==================== 轮询 ====================
function startPolling() {
    poll();
    pollTimer = setInterval(poll, 1500);
}

function stopPolling() { clearInterval(pollTimer); }

async function poll() {
    await Promise.all([fetchStatus(), fetchLogs(), fetchFiles(), fetchPrompt()]);
}

async function fetchStatus() {
    try { const d = await (await fetch(API + '/status')).json(); engineStatus.textContent = d.state || 'idle'; } catch(e) {}
}
async function fetchLogs() {
    try {
        const d = await (await fetch(API + '/logs')).json();
        logContent.textContent = d.lines.join('\n');
        logScroll.scrollTop = logScroll.scrollHeight;
    } catch(e) {}
}
async function fetchFiles() {
    try {
        const d = await (await fetch(API + '/files')).json();
        fileList.innerHTML = d.files.map(f => {
            const ext = f.endsWith('.json') ? 'json' : 'md';
            return `<li class="file-item" onclick="openFile('${f}')"><span class="file-icon ${ext}"></span><span class="file-name">.agent_workspace/${f}</span></li>`;
        }).join('');
    } catch(e) {}
}
async function fetchPrompt() {
    try {
        const d = await (await fetch(API + '/prompt')).json();
        if (d.active) {
            hitlPrompt.textContent = d.prompt;
            hitlOverlay.classList.add('show');
            hitlAnswer.focus();
        }
    } catch(e) {}
}
async function openFile(filename) {
    await fetch(API + '/open', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({file:filename}) }).catch(()=>{});
}

// ==================== HITL 回答 ====================
hitlSubmit.addEventListener('click', async () => {
    const answer = hitlAnswer.value.trim();
    if (!answer) return;
    await fetch(API + '/respond', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({answer}) });
    hitlOverlay.classList.remove('show');
    hitlAnswer.value = '';
});
hitlAnswer.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') hitlSubmit.click();
});

// ==================== 概念简案输入 ====================
userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;
        fetch(API + '/concept', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text}) });
    }
});

// ==================== 记忆积累 ====================
function refreshKnowledge() {
    fetch(API + '/knowledge?type=best').then(r => r.json()).then(d => {
        document.getElementById('bestFiles').innerHTML = d.files.map(f =>
            `<li class="file-item" onclick="openKnowledge('best','${f}')"><span class="file-icon md"></span><span class="file-name">${f}</span></li>`).join('');
    }).catch(()=>{});
    fetch(API + '/knowledge?type=anti').then(r => r.json()).then(d => {
        document.getElementById('antiFiles').innerHTML = d.files.map(f =>
            `<li class="file-item" onclick="openKnowledge('anti','${f}')"><span class="file-icon md"></span><span class="file-name">${f}</span></li>`).join('');
    }).catch(()=>{});
}
function openKnowledge(type, filename) {
    fetch(API + '/open_knowledge', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type,file:filename}) }).catch(()=>{});
}
document.getElementById('btnRed').onclick = () => archive('red');
document.getElementById('btnBlack').onclick = () => archive('black');
function archive(listType) {
    const doc = document.getElementById('archDoc').value.trim();
    const comment = document.getElementById('archComment').value.trim() || '(无评语)';
    if (!doc) return alert('请输入文档名');
    document.getElementById('archResult').textContent = '归档中...';
    fetch(API + '/archive', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({doc,type:listType,comment}) })
    .then(r => r.json()).then(d => { document.getElementById('archResult').textContent = d.ok?'归档成功':'失败: '+(d.error||''); refreshKnowledge(); })
    .catch(() => { document.getElementById('archResult').textContent = '网络错误'; });
}

fetchStatus(); fetchFiles();
</script>
</body>
</html>
