	add option {id = 3, name="左边", 	tip="左边"}
	add option {id = 4, name="右边", 	tip="右边"}

;------------------------------------------
; 定义类
;------------------------------------------
define class {key="class_born",    		name="出生点"}

define class {key="class_spawn_npc",    name="刷怪器"}
    add param {type="npc_tplid", 		key="npc_id",   	name="NpcId",		tip = "怪物模板Id"}
    add param {type="string", 			key="interval",   	name="刷新间隔",	tip = "每隔多少秒刷出一只"}
	add param {type="string", 			key="delay",   		name="首次延迟", 	tip = "单位秒"}
	add param {type="string", 			key="max",   		name="最大数量",	tip = "最大刷多少只怪"}

define class {key="class_road_dir",    	name="寻路方向"}
    add param {type="dir_type", 		key="dir",   		name="寻路方向", 	tip = "可以选多个"}
	
define class {key="class_random_item",	name="随机道具"}
    add param {type="drop_tplid", 		key="random_item",  name="随机道具", 	tip = "对应drop表"}

define class {key="class_house",		name="房子"}
    add param {type="int", 				key="group_ip",  	name="房子配置", 	tip = "对应house表"}

define class {key="class_flip_game",    name="翻盘游戏"}

define class {key="class_bomb",			name="炸弹"}
    add param {type="int", 				key="rest_days",  		name="休息回合", tip = "配置回合数+1 比如休息一回合就配2"}
    add param {type="int", 				key="effect_id",  		name="特效ID", 	tip = "对应04_effects.txt"}

define class {key="class_hospital",			name="医院"}
    add param {type="grid_id", 				key="pos_id",  			name="出院点ID", tip = "出院点的位置"}
	
define class {key="class_building",			name="建筑"}
    add param {type="grid_id_list", 		key="ids",  			name="有效位置", tip = "哪些位置可以买"}
	
define class {key="class_transfer",			name="传送门"}
    add param {type="grid_id", 				key="id",  				name="传送位置", tip = "传送到哪个位置"}
	add param {type="dir_type", 			key="dir",  			name="朝向", tip = "朝向"}
	
