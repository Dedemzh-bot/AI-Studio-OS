define var {key=bool, 			name=开关}
define var {key=float, 			name=浮点数}
define var {key=int, 			name=整数}
define var {key=string, 		name=字符串}
define var {key=obj_id, 		name=物件id}
define var {key=obj_tag, 		name=物件tag}
define var {key=custom_event_id, name=自定义事件}

define var {key=grid_id, 		name=格子id}
define var {key=grid_id_list, 	name=格子id列表}
define var {key=effect_tplid, 	name=特效, 	    type="file_options", 	file="14_effects.txt"}
define var {key=npc_tplid, 		name=Npc, 	    type="file_options", 	file="02_npcs.txt"}
define var {key=drop_tplid, 	name=掉落Id, 	    type="file_options", 	file="03_drop.txt"}

define var {key=drop,           name=下拉列表,    type=options}
