define var {key=msg_type,           name=消息类型,    type=options}
	add option {id = 1, name="Info", tip="白色输出"}
	add option {id = 2, name="Error", tip="红色错误消息"}
	add option {id = 3, name="Message", tip="消息弹框"}


define var {key=dir_type,           name=方向类型,    type=multi_options}
