; 定义事件
;------------------------------------------
define event {key="CTE_OnGameInit", 		    name="当首次进入游戏时"}
define event {key="CTE_OnGameStart", 		    name="当游戏开始时"}
define event {key="CTE_OnEntryRegion", 		    name="当进入区域时"}
	def meta {desc="当进入区域{{id}}时" }
	add param {type="string", 	    			key="id", 		    	name="区域id", 		tip="不填表示自身"}

define event {key="CTE_OnEntryGrid", 	    	name="当经过格子时", 	tip="当经过格子时"}
	def meta {desc="当经过格子时" }
	add param {type="grid_id_list", 	    	key="id", 		    	name="格子",  		tip="不填表示自身"}

define event {key="CTE_OnReachGrid", 	    	name="当到达格子时", 	tip="当到达格子时"}
	def meta {desc="当到达格子时" }
	add param {type="grid_id_list", 	    	key="id", 		    	name="格子",  		tip="不填表示自身"}

;------------------------------------------
; 定义条件
;------------------------------------------
define condition {key="CTC_Test", 		name="测试条件"}
	def meta {desc="测试条件{{id}}" }
	add param {type="string", 	    			key="id", 		    	name="区域id", 		tip="不填表示自身"}


;------------------------------------------
; 定义事件触发后的行为
;------------------------------------------
define action {key="CTA_WaitTime",    name="等待一段时间"}
	def meta {category="常用",  	desc="等待 {{time}} 秒" }
	add param {type="float", 		key="time",   name="秒"}

define action {key="CTA_Print",    name="调试输出"}
	def meta {category="常用",  	desc="输出: {{value}}" }
	add param {type="string", 		key="value",   name="内容"}
	add param {type="msg_type", 	key="type",   name="类型"}

define action {key="CTA_PlayEffect",    name="播放特效"}
	def meta {category="常用",  	desc="播放特效: {{eff_id}}" }
	add param {type="string", 		key="eff_id",   name="特效id"}

define action {key="CTA_PlayAudio",    name="播放声音"}
	def meta {category="常用",  	desc="播放声音: {{audio_id}}" }
	add param {type="string", 		key="audio_id",   name="声音id"}

define action {key="CTA_SendEvent",    name="发送自定义事件"}
	def meta {category="常用",  	desc="发送自定义事件: {{name}}" }
	add param {type="custom_event_id", 	key="name",   name="事件名"}